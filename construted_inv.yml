plugin: ansible.builtin.constructed
strict: false

compose:
  gms_name: "inventory_hostname.split('.')[0] | lower"

  gms_valid: >-
    (inventory_hostname.split('.')[0] | lower)
    is match('^(inb|ric)[pqd][wl]agm(dafp|iccp|pixp|chrs|webp|osim|pddv|deve|sand|otch|pdch)[0-9]{2}v$')

  gms_site_code: >-
    (inventory_hostname.split('.')[0] | lower)[0:3]
    if ((inventory_hostname.split('.')[0] | lower) is match('^(inb|ric)[pqd][wl]agm(dafp|iccp|pixp|chrs|webp|osim|pddv|deve|sand|otch|pdch)[0-9]{2}v$'))
    else none

  gms_cluster_num: >-
    (inventory_hostname.split('.')[0] | lower)[12:15]
    if ((inventory_hostname.split('.')[0] | lower) is match('^(inb|ric)[pqd][wl]agm(dafp|iccp|pixp|chrs|webp|osim|pddv|deve|sand|otch|pdch)[0-9]{2}v$'))
    else none

  # environment: pure regex_replace chain, no dict/get
  gms_environment: >-
    ((inventory_hostname.split('.')[0] | lower)[3:4]
    if ((inventory_hostname.split('.')[0] | lower) is match('^(inb|ric)[pqd][wl]agm(dafp|iccp|pixp|chrs|webp|osim|pddv|deve|sand|otch|pdch)[0-9]{2}v$'))
    else 'no_match')
    | regex_replace('^p$', 'prod')
    | regex_replace('^q$', 'qa')
    | regex_replace('^d$', 'dev')
    | regex_replace('^no_match$', '')
    | default(none, true)

  # os: pure regex_replace chain
  gms_os: >-
    ((inventory_hostname.split('.')[0] | lower)[4:5]
    if ((inventory_hostname.split('.')[0] | lower) is match('^(inb|ric)[pqd][wl]agm(dafp|iccp|pixp|chrs|webp|osim|pddv|deve|sand|otch|pdch)[0-9]{2}v$'))
    else 'no_match')
    | regex_replace('^w$', 'windows')
    | regex_replace('^l$', 'linux')
    | regex_replace('^no_match$', '')
    | default(none, true)

  # role name: pure regex_replace chain, one line per code
  gms_role_name: >-
    ((inventory_hostname.split('.')[0] | lower)[8:12]
    if ((inventory_hostname.split('.')[0] | lower) is match('^(inb|ric)[pqd][wl]agm(dafp|iccp|pixp|chrs|webp|osim|pddv|deve|sand|otch|pdch)[0-9]{2}v$'))
    else 'no_match')
    | regex_replace('^dafp$', 'dac')
    | regex_replace('^iccp$', 'iccp')
    | regex_replace('^pixp$', 'pi')
    | regex_replace('^chrs$', 'chronus')
    | regex_replace('^webp$', 'web')
    | regex_replace('^osim$', 'ots')
    | regex_replace('^pddv$', 'pds')
    | regex_replace('^deve$', 'dev')
    | regex_replace('^sand$', 'sand')
    | regex_replace('^otch$', 'ots_chronus')
    | regex_replace('^pdch$', 'pds_chronus')
    | regex_replace('^no_match$', '')
    | default(none, true)

keyed_groups:
  - key: gms_site_code
    prefix: site
    separator: "_"
  - key: gms_environment
    prefix: env
    separator: "_"
  - key: gms_os
    prefix: os
    separator: "_"
  - key: gms_role_name
    prefix: role
    separator: "_"
  - key: gms_cluster_num
    prefix: role_cluster_num
    separator: "_"

groups:
  gms_unclassified: "not gms_valid"
