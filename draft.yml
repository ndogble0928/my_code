---
- name: Secure Boot and Platform Key Audit
 hosts: all
 gather_facts: true

 pre_tasks:
   - name: Set report path
     ansible.builtin.set_fact:
       report_path: "/tmp/secureboot_report_{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}.csv"
     delegate_to: localhost
     run_once: true

 tasks:
   - name: Check Secure Boot status
     ansible.windows.win_shell: |
       try {
         $result = Confirm-SecureBootUEFI
         Write-Output $result
       } catch {
         Write-Output "ERROR: $($_.Exception.Message)"
       }
     register: secureboot_result
     ignore_errors: true

   - name: Check Platform Key (2023 cert)
     ansible.windows.win_shell: |
       try {
         $pk = Get-SecureBootUEFI -Name PK
         $bytes = $pk.Bytes
         $cert = $bytes[44..($bytes.Length-1)]
         $tmpFile = "$env:TEMP\PK.der"
         [IO.File]::WriteAllBytes($tmpFile, $cert)
         $dump = certutil -dump $tmpFile
         Write-Output ($dump -join "`n")
         Remove-Item $tmpFile -Force
         if ($dump -match "2023") {
           Write-Output "2023_CERT_FOUND"
         } else {
           Write-Output "2023_CERT_NOT_FOUND"
         }
       } catch {
         Write-Output "ERROR: $($_.Exception.Message)"
       }
     register: pk_result
     ignore_errors: true

   - name: Check UEFICA2023Status registry value
     ansible.windows.win_reg_stat:
       path: HKLM:\SYSTEM\CurrentControlSet\Control\SecureBoot\Servicing
       name: UEFICA2023Status
     register: registry_result
     ignore_errors: true

   - name: Build registry result fact
     ansible.builtin.set_fact:
       uefica_status: "{{ registry_result.value if registry_result.exists else 'KEY_NOT_FOUND' }}"

   - name: Check KEK 2023 cert
     ansible.windows.win_shell: |
       try {
         $result = ([System.Text.Encoding]::ASCII.GetString((Get-SecureBootUEFI kek).bytes) -match 'Microsoft Corporation KEK 2K CA 2023')
         Write-Output $result
       } catch {
         Write-Output "ERROR: $($_.Exception.Message)"
       }
     register: kek_result
     ignore_errors: true

   - name: Check DB Windows UEFI CA 2023
     ansible.windows.win_shell: |
       try {
         $result = ([System.Text.Encoding]::ASCII.GetString((Get-SecureBootUEFI db).bytes) -match 'Windows UEFI CA 2023')
         Write-Output $result
       } catch {
         Write-Output "ERROR: $($_.Exception.Message)"
       }
     register: db_windows_result
     ignore_errors: true

   - name: Check DB Microsoft UEFI CA 2023
     ansible.windows.win_shell: |
       try {
         $result = ([System.Text.Encoding]::ASCII.GetString((Get-SecureBootUEFI db).bytes) -match 'Microsoft UEFI CA 2023')
         Write-Output $result
       } catch {
         Write-Output "ERROR: $($_.Exception.Message)"
       }
     register: db_microsoft_result
     ignore_errors: true

   - name: Check DB Microsoft Option ROM UEFI CA 2023
     ansible.windows.win_shell: |
       try {
         $result = ([System.Text.Encoding]::ASCII.GetString((Get-SecureBootUEFI db).bytes) -match 'Microsoft Option ROM UEFI CA 2023')
         Write-Output $result
       } catch {
         Write-Output "ERROR: $($_.Exception.Message)"
       }
     register: db_optrom_result
     ignore_errors: true

   - name: Print command output
     ansible.builtin.debug:
       var: pk_result.stdout_lines

   - name: Build report line per host
     ansible.builtin.set_fact:
       report_line: "{{ inventory_hostname }},{{ secureboot_result.stdout | trim }},{{ pk_result.stdout_lines | last | trim }},{{ 'Virtual' if ansible_virtualization_role == 'guest' else 'Physical' }},{{ uefica_status }},{{ kek_result.stdout | trim }},{{ db_windows_result.stdout | trim }},{{ db_microsoft_result.stdout | trim }},{{ db_optrom_result.stdout | trim }}"

   - name: Write CSV header
     ansible.builtin.lineinfile:
       path: "{{ report_path }}"
       line: "Hostname,SecureBoot_Enabled,PK_2023_Cert,Server_Type,UEFICA2023Status,KEK_2K_CA_2023,DB_Windows_UEFI_CA_2023,DB_Microsoft_UEFI_CA_2023,DB_Option_ROM_UEFI_CA_2023"
       create: true
     delegate_to: localhost
     run_once: true

   - name: Append each host result to CSV
     ansible.builtin.lineinfile:
       path: "{{ report_path }}"
       line: "{{ report_line }}"
       create: true
     delegate_to: localhost
     throttle: 1

 post_tasks:
   - name: Include fact role
     ansible.builtin.include_role:
       name: itio_co_ansible.general.facts
     run_once: true

   - name: Show report
     ansible.builtin.debug:
       msg: "{{ lookup('file', report_path) }}"
     delegate_to: localhost
     run_once: true

   - name: Send report notification email
     ansible.builtin.include_role:
       name: itio_co_ansible.general.mail
     vars:
       mail_subject: "ITIO CO - Secure Boot Audit Report - {{ lookup('pipe', 'date +%Y-%m-%d') }}"
       mail_attach:
         - "{{ report_path }}"
       mail_to: nico.a.dogble@dominionenergy.com
     run_once: true
