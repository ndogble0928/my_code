---
- name: Secure Boot and Platform Key Audit
  hosts: all  # replace with your CS/CSQ inventory group
  gather_facts: false
  vars:
    report_path: "/tmp/secureboot_report_{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}.csv"


  tasks:
- name: Check UEFICA2023Status registry value
      ansible.windows.win_shell: |
        try {
          $val = Get-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\SecureBoot\Servicing" -Name "UEFICA2023Status" -ErrorAction Stop
          Write-Output $val.UEFICA2023Status
        } catch {
          Write-Output "KEY_NOT_FOUND"
        }
      register: registry_result
      ignore_errors: true

    - name: Check Windows UEFI CA 2023 in db
      ansible.windows.win_shell: |
        try {
          $result = ([System.Text.Encoding]::ASCII.GetString((Get-SecureBootUEFI db).bytes) -match 'Windows UEFI CA 2023')
          Write-Output $result
        } catch {
          Write-Output "ERROR: $($_.Exception.Message)"
        }
      register: db_result
      ignore_errors: true

- name: Build report line per host
      ansible.builtin.set_fact:
        report_line: "{{ inventory_hostname }},{{ secureboot_result.stdout | trim }},{{ pk_result.stdout_lines | last | trim }},{{ 'Virtual' if ansible_virtualization_role == 'guest' else 'Physical' }},{{ registry_result.stdout | trim }},{{ db_result.stdout | trim }}"




line: "Hostname,SecureBoot_Enabled,PK_2023_Cert,Server_Type,UEFICA2023Status,DB_2023_Match"






      
    - name: Set report path fact
      ansible.builtin.set_fact:
        report_path_virtual: "secureboot_report_virtual_{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}.csv"
        report_path_physical: "/tmp/secureboot_report_physical_{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}.csv"
      delegate_to: localhost
      run_once: true
    
    - name: Write report headers
      ansible.builtin.lineinfile:
        path: "{{ item }}"
        line: "Hostname,SecureBoot_Enabled,PK_2023_Cert"
        create: true
      delegate_to: localhost
      run_once: true
      loop:
        - "{{ report_path_virtual }}"
        - "{{ report_path_physical }}"

    - name: Append virtual hosts to report
      ansible.builtin.lineinfile:
        path: "{{ report_path_virtual }}"
        line: "{{ report_line }}"
        create: true
      delegate_to: localhost
      throttle: 1
      when: ansible_virtualization_role == 'guest'

    - name: Append physical hosts to report
      ansible.builtin.lineinfile:
        path: "{{ report_path_physical }}"
        line: "{{ report_line }}"
        create: true
      delegate_to: localhost
      throttle: 1
      when: ansible_virtualization_role != 'guest'
        mail_attach:
          - "{{ report_path_virtual }}"
          - "{{ report_path_physical }}"
    - name: Inspect PK bytes
      ansible.windows.win_shell: |
        $pk = Get-SecureBootUEFI -Name PK
        $bytes = $pk.Bytes
        Write-Output "Total bytes: $($bytes.Length)"
        Write-Output "First 10 bytes: $($bytes[0..9] -join ', ')"
      register: pk_inspect

    - name: Display byte info
      ansible.builtin.debug:
        var: pk_inspect.stdout_lines

    - name: Check Secure Boot status
      ansible.windows.win_shell: |
        try {
          $result = Confirm-SecureBootUEFI
          Write-Output $result
        } catch {
          Write-Output "ERROR: $($_.Exception.Message)"
        }
      register: secureboot_result
      ignore_errors: true

    - name: Check Platform Key (2023 cert)
      ansible.windows.win_shell: |
        try {
          $pk = Get-SecureBootUEFI -Name PK
          $bytes = $pk.Bytes
          $cert = $bytes[44..($bytes.Length-1)]
          $tmpFile = "$env:TEMP\PK.der"
          [IO.File]::WriteAllBytes($tmpFile, $cert)
          $dump = certutil -dump $tmpFile
          Remove-Item $tmpFile -Force
          if ($dump -match "2023") {
            Write-Output "2023_CERT_FOUND"
          } else {
            Write-Output "2023_CERT_NOT_FOUND"
          }
        } catch {
          Write-Output "ERROR: $($_.Exception.Message)"
        }
      register: pk_result
      ignore_errors: true

    - name: Build report line per host
      ansible.builtin.set_fact:
        report_line: "{{ inventory_hostname }},{{ secureboot_result.stdout | trim }},{{ pk_result.stdout | trim }}"

  post_tasks:
    - name: Write CSV header
      ansible.builtin.lineinfile:
        path: "{{ report_path }}"
        line: "Hostname,SecureBoot_Enabled,PK_2023_Cert"
        create: true
      delegate_to: localhost
      run_once: true

    - name: Append each host result to CSV
      ansible.builtin.lineinfile:
        path: "{{ report_path }}"
        line: "{{ report_line }}"
      delegate_to: localhost
