---
# Deploy an RDP listener certificate, grant NETWORK SERVICE key access, retire the old cert.
#
# Generic across hosts and certs: each host in rdp_hosts supplies its own `cert_name` and its
# own vaulted `vault_pfx_password`, so one playbook run can deploy a different cert to every
# host. The PFX lives on a Linux cert-management server at:
#   {{ remote_pfx_root }}/{{ cert_name }}/{{ cert_name }}.p12
# fetched on demand for each host via delegate_to — no separate "fetch play" or hardcoded
# per-cert paths.
#
# Per-host configuration you need to provide (inventory / host_vars):
#   host_vars/<windows_host>.yml:
#     cert_name: local.flexnet.net
#   host_vars/<windows_host>/vault.yml  (ansible-vault encrypt):
#     vault_pfx_password: '$eNsus33'
#
# Group-level configuration (group_vars/rdp_hosts.yml or similar):
#   certmgr_host: certmgr01          # inventory name of the Linux cert-mgmt server
#   remote_pfx_root: /root/certmgr/certs
#
# Requires: ansible.windows collection (ansible-galaxy collection install ansible.windows).
# The fetch task delegates to certmgr_host over SSH and needs become: true there, since the
# source path is under /root/.
# WinRM auth must support credential delegation for the PFX import step specifically
# (CredSSP/Kerberos-with-delegation, or run with become on the Windows play) — importing a
# password-protected PKCS12 over WinRM hits this restriction regardless of where the file
# came from. See the win_certificate_store module notes.
#
# Neither the old nor the new certificate's thumbprint is hardcoded. Both are read at
# runtime right after the PFX copy: the old one from the registry (whatever RDP-Tcp is
# currently bound to), the new one straight from the PFX file on disk.

- name: Deploy RDP listener certificate
  hosts: rdp_hosts
  gather_facts: false

  vars:
    certmgr_host: certmgr01
    remote_pfx_root: /root/certmgr/certs
    remote_pfx_path: "{{ remote_pfx_root }}/{{ cert_name }}/{{ cert_name }}.p12"
    # Per-host fetch path (keyed by inventory_hostname) so multiple hosts running in the same
    # play don't clobber each other's copy on the control node.
    fetched_pfx_path: "/tmp/ansible-fetched-certs/{{ inventory_hostname }}/{{ cert_name }}.p12"
    local_pfx_path: 'C:\Temp\{{ cert_name }}.p12'
    pfx_password: "{{ vault_pfx_password }}"
    marker_file: 'C:\Temp\RDP256Cert2026.txt'

  tasks:

    # Guard: if the marker file from Step 3 already exists, skip everything below — including
    # the fetch, so a host that's already deployed doesn't even pull the PFX down again.
    - name: Check for idempotency marker (prevents re-applying and breaking RDP)
      ansible.windows.win_stat:
        path: "{{ marker_file }}"
      register: marker

    - name: Run cert deployment
      when: not marker.stat.exists
      block:

        # Step 1a: make sure the local destination folder exists before copying into it.
        - name: Ensure C:\Temp exists
          ansible.windows.win_file:
            path: 'C:\Temp'
            state: directory

        # Step 1a: pull this host's cert down to the control node. delegate_to switches the
        # connection for just this task to the Linux cert-mgmt host, while remote_pfx_path/
        # fetched_pfx_path still resolve using *this* Windows host's own cert_name — so each
        # host in the play fetches its own cert without any separate per-cert play.
        - name: Fetch this host's PFX from the certificate management server
          delegate_to: "{{ certmgr_host }}"
          become: true
          ansible.builtin.fetch:
            src: "{{ remote_pfx_path }}"
            dest: "{{ fetched_pfx_path }}"
            flat: true

        # Step 1b: push it from the control node onto the Windows host.
        - name: Copy PFX from control node to local disk
          ansible.windows.win_copy:
            src: "{{ fetched_pfx_path }}"
            dest: "{{ local_pfx_path }}"

        # Capture both thumbprints right after the copy, before anything is imported or
        # changed on the host:
        #   - old: whatever the RDP-Tcp listener is currently bound to, read straight from
        #     the registry key Win32_TSGeneralSetting itself reflects (same value, no WMI
        #     round trip needed).
        #   - new: read directly from the PFX file on disk via X509Certificate2Collection,
        #     since the file may contain more than the leaf cert (e.g. an intermediate) —
        #     filters down to whichever entry actually has a private key, and throws if
        #     that isn't exactly one, same as the original script's throws.
        # No module does either of these, so both stay ad-hoc PowerShell via win_powershell.
        # EphemeralKeySet loads the private key without writing a temp key file to disk —
        # this is a read-only inspection, nothing here should persist anything.
        - name: Read old and new certificate thumbprints
          ansible.windows.win_powershell:
            error_action: stop
            script: |
              $regPath = "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp"
              $oldBytes = (Get-ItemProperty -Path $regPath -Name SSLCertificateSHA1Hash -ErrorAction SilentlyContinue).SSLCertificateSHA1Hash
              $oldThumbprint = if ($oldBytes) { ($oldBytes | ForEach-Object { $_.ToString("X2") }) -join "" } else { "" }

              $collection = New-Object System.Security.Cryptography.X509Certificates.X509Certificate2Collection
              $collection.Import('{{ local_pfx_path }}', '{{ pfx_password }}', 'EphemeralKeySet')
              $withKey = $collection | Where-Object { $_.HasPrivateKey }
              if ($withKey.Count -ne 1) {
                  throw "Expected exactly one certificate with a private key in {{ local_pfx_path }}, found $($withKey.Count)."
              }

              [PSCustomObject]@{
                  OldThumbprint = $oldThumbprint
                  NewThumbprint = $withKey[0].Thumbprint
              }
          register: thumbprint_check

        - name: Set old and new thumbprint facts
          ansible.builtin.set_fact:
            old_thumbprint: "{{ thumbprint_check.output[0].OldThumbprint }}"
            new_thumbprint: "{{ thumbprint_check.output[0].NewThumbprint }}"

        - name: Report captured thumbprints
          ansible.builtin.debug:
            msg:
              - "Certificate: {{ cert_name }}"
              - "Currently bound (old) thumbprint: {{ old_thumbprint if old_thumbprint else 'none found' }}"
              - "New certificate thumbprint: {{ new_thumbprint }}"

        # Step 2a: import the PFX into the LocalMachine\My store (replaces certutil -importPFX).
        - name: Import PFX into LocalMachine\My
          ansible.windows.win_certificate_store:
            path: "{{ local_pfx_path }}"
            password: "{{ pfx_password }}"
            state: present
            store_location: LocalMachine
            store_name: My
            key_storage: machine
            key_exportable: false
          register: cert_import

        # Sanity check: confirm the import actually produced the cert we read from the file
        # a moment ago, rather than trusting the pre-import read blindly.
        - name: Verify the imported certificate matches the expected thumbprint
          ansible.builtin.assert:
            that:
              - new_thumbprint in cert_import.thumbprints
            fail_msg: >-
              Import did not produce the expected certificate {{ new_thumbprint }};
              store now has {{ cert_import.thumbprints }}.

        # Step 2d: bind the new cert to the RDP listener.
        # No module (ansible.windows or community.windows) wraps Win32_TSGeneralSetting /
        # Set-WmiInstance — confirmed nothing exists for RDP listener cert binding, only
        # win_iis_webbinding for IIS. This has to be ad-hoc PowerShell either way, so it uses
        # win_powershell (the modern, structured replacement for win_shell) rather than raw
        # win_shell: it gives real failure detection on thrown/terminating errors instead of
        # relying on exit-code/stderr parsing.
        - name: Bind certificate to RDP listener
          ansible.windows.win_powershell:
            error_action: stop
            script: |
              Set-WmiInstance -Namespace "root\cimv2\terminalservices" `
                -Path "Win32_TSGeneralSetting.TerminalName='RDP-tcp'" `
                -Argument @{ SSLCertificateSHA1Hash = "{{ new_thumbprint }}" }

        # Step 4a: resolve the private key's file path on disk, needed for the ACL grant below.
        # win_certificate_info does not expose the CSP/CNG key container name or file path
        # (checked its return values — only cert metadata, no key storage details), so this
        # also has no module equivalent and stays as ad-hoc PowerShell via win_powershell.
        - name: Locate private key container path
          ansible.windows.win_powershell:
            error_action: stop
            script: |
              $cert = Get-ChildItem Cert:\LocalMachine\My | Where-Object { $_.Thumbprint -eq '{{ new_thumbprint }}' }
              $keyName = $cert.PrivateKey.CspKeyContainerInfo.UniqueKeyContainerName
              "C:\ProgramData\Microsoft\Crypto\RSA\MachineKeys\$keyName"
          register: key_path
          changed_when: false

        # Step 4: grant NETWORK SERVICE (S-1-5-20) read access to the private key (replaces icacls).
        # win_powershell returns script output as a list under `.output`, not `.stdout`
        # (that's a win_shell/win_command-ism) — the path is the single item returned.
        - name: Grant NETWORK SERVICE read access to the private key
          ansible.windows.win_acl:
            path: "{{ key_path.output[0] }}"
            user: "NT AUTHORITY\\NETWORK SERVICE"
            rights: Read
            type: allow
            state: present

        # Step 5: restart Terminal Services so the new binding/permissions take effect.
        - name: Restart Terminal Services
          ansible.windows.win_service:
            name: TermService
            state: restarted
            force_dependent_services: true

        # Step 3: create the marker file so this whole block is skipped on future runs.
        - name: Create idempotency marker file
          ansible.windows.win_file:
            path: "{{ marker_file }}"
            state: touch

        # Step 6: delete the old certificate now that the new one is fully in place.
        # Guarded two ways: skip if there was nothing bound before (fresh host), and never
        # remove it if old and new happen to be the same thumbprint — that would mean the
        # marker check somehow got bypassed and this is a re-run against an already-deployed
        # cert, and deleting it here would rip out the cert we just bound.
        - name: Remove old certificate
          ansible.windows.win_certificate_store:
            thumbprint: "{{ old_thumbprint }}"
            store_location: LocalMachine
            store_name: My
            state: absent
          when:
            - old_thumbprint | length > 0
            - old_thumbprint != new_thumbprint

        # Clean up the fetched PFX from the control node — it's a password-protected private
        # key, no reason to leave it sitting on the controller's disk after the run. Only
        # reachable when this block actually ran, since that's the only time anything was
        # fetched in the first place.
        - name: Remove the fetched PFX from the control node
          delegate_to: localhost
          ansible.builtin.file:
            path: "{{ fetched_pfx_path }}"
            state: absent
